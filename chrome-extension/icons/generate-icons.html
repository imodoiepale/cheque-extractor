<!DOCTYPE html>
<html>
<head><title>Generate CheckSync Pro Icons</title></head>
<body>
<p>Right-click each canvas and "Save Image As" to save the icon PNGs.</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.15;
  // Rounded rect background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#10b981');
  grad.addColorStop(1, '#059669');
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  // "CS" text
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.38}px Inter, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CS', size / 2, size / 2 + size * 0.02);
}
drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
